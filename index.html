<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mangarr</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4c1d95 100%);
      color: #f5f3ff;
      text-align: center;
      padding: 2rem;
    }
    .card {
      max-width: 36rem;
    }
    h1 {
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      margin: 0 0 0.5rem;
      letter-spacing: -0.03em;
    }
    p {
      font-size: clamp(1rem, 3vw, 1.25rem);
      opacity: 0.85;
      line-height: 1.6;
      margin: 0;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Hello, world! 👋</h1>
    <p>Welcome to <strong>Mangarr</strong>. This site is live on GitHub Pages.</p>
  </main>
</body>
</html>
