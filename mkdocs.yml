site_name: Mangarr Wiki
site_url: https://mangarr.github.io/wiki/
site_description: Documentation and wiki for Mangarr.
repo_url: https://github.com/mangarr/mangarr.github.io
repo_name: mangarr/mangarr.github.io
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - First-Time Setup: getting-started/first-time-setup.md
      - Connecting MangarrGateway: getting-started/gateway-setup.md
  - Using Mangarr:
      - Adding Manga: usage/adding-manga.md
      - Your Library: usage/library.md
      - Searching & Grabbing: usage/searching.md
      - Activity: usage/activity.md
      - Wanted: usage/wanted.md
      - Manual Import: usage/manual-import.md
  - Discovery: discovery.md
  - Configuration:
      - Media Management: configuration/media-management.md
      - Profiles: configuration/profiles.md
      - Custom Formats: configuration/custom-formats.md
      - Indexers: configuration/indexers.md
      - Download Clients: configuration/download-clients.md
      - Import Lists: configuration/import-lists.md
      - Notifications: configuration/notifications.md
      - Metadata: configuration/metadata.md
      - General &amp; Security: configuration/general.md
  - MangarrGateway:
      - Overview: gateway.md
      - Sources: gateway/sources.md
  - Help:
      - FAQ: faq.md
      - Troubleshooting: troubleshooting.md
